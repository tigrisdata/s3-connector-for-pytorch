kind: s3iterabledataset
batch_size: 128
num_workers: 8
s3reader:
  # s3reader type: sequential or range_based
  type: sequential # default
  # buffer_size (bytes): only used with range_based s3reader type
  buffer_size: 8*1024*1024 # default
  # CRT client tuning (per worker process). Optional; omit to use library defaults.
  # throughput_target_gbps: target throughput per CRT client; raise it to let the
  #   client fan out more parallel connections per GET. Library default: 10.0.
  throughput_target_gbps: 100.0
  # client_part_size: bytes per CRT GET part. Larger = fewer, longer-lived TCP
  #   transfers; smaller = more parallel parts per shard. Library default: 8 MiB.
  client_part_size: 16*1024*1024
